<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&amp;display=swap');
      .logo-text {
        font-family: 'Baloo 2', 'Nunito', sans-serif;
        font-weight: 800;
        font-size: 58px;
        fill: #0A1E5C;
        letter-spacing: -2px;
      }
    </style>
    <clipPath id="eyeClip">
      <circle cx="600" cy="170" r="125"/>
    </clipPath>
  </defs>
  
  <!-- Fond blanc -->
  <rect width="1200" height="400" fill="#FFFFFF"/>
  
  <!-- Étoiles décoratives gauche -->
  <g fill="#6B8FE8">
    <path d="M 440 280 L 448 295 L 463 303 L 448 311 L 440 326 L 432 311 L 417 303 L 432 295 Z">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <circle cx="470" cy="120" r="5">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="490" cy="290" r="4">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Étoile décorative droite -->
  <g fill="#6B8FE8">
    <path d="M 760 280 L 768 295 L 783 303 L 768 311 L 760 326 L 752 311 L 737 303 L 752 295 Z">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <circle cx="735" cy="135" r="4">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Bandes en éventail à GAUCHE -->
  <g stroke="#6B8FE8" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="370" y1="338" x2="405" y2="350"/>
    <line x1="360" y1="360" x2="410" y2="360"/>
    <line x1="370" y1="382" x2="405" y2="370"/>
  </g>
  
  <!-- Bandes en éventail à DROITE -->
  <g stroke="#6B8FE8" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="795" y1="350" x2="830" y2="338"/>
    <line x1="790" y1="360" x2="840" y2="360"/>
    <line x1="795" y1="370" x2="830" y2="382"/>
  </g>
  
  <!-- Œil nazar -->
  <circle cx="600" cy="170" r="125" fill="#1E3A8A"/>
  <circle cx="600" cy="170" r="90" fill="#FFFFFF"/>
  <circle cx="600" cy="170" r="58" fill="#A5D8F3"/>
  
  <!-- Pupille animée -->
  <circle cx="600" cy="170" r="25" fill="#0A1E5C">
    <animateTransform 
      attributeName="transform" 
      type="translate"
      values="0,0; 20,0; 20,0; -20,4; -20,4; 0,-15; 0,-15; 12,12; 12,12; 0,0; 0,0"
      keyTimes="0; 0.1; 0.22; 0.32; 0.44; 0.54; 0.66; 0.76; 0.88; 0.95; 1"
      dur="7s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1"/>
  </circle>
  
  <!-- Reflets blancs -->
  <g>
    <ellipse cx="635" cy="123" rx="11" ry="16" fill="#FFFFFF" transform="rotate(-25 635 123)"/>
    <circle cx="622" cy="150" r="5" fill="#FFFFFF"/>
  </g>
  
  <!-- Clignement : les paupières sont CACHÉES par défaut (hors du clip),
       et viennent se fermer brièvement au milieu de l'animation -->
  <g clip-path="url(#eyeClip)">
    <!-- Paupière du haut : reste à y=-130 (hors zone), descend à y=45 pendant ~0.2s -->
    <rect x="475" width="250" height="125" fill="#1E3A8A">
      <animate attributeName="y"
               values="-130; -130; 45; 45; -130; -130"
               keyTimes="0; 0.48; 0.51; 0.54; 0.57; 1"
               dur="7s"
               repeatCount="indefinite"
               calcMode="spline"
               keySplines="0 0 1 1; 0.4 0 0.6 1; 0 0 1 1; 0.4 0 0.6 1; 0 0 1 1"/>
    </rect>
    <!-- Paupière du bas : reste à y=420 (hors zone), monte à y=170 -->
    <rect x="475" width="250" height="125" fill="#1E3A8A">
      <animate attributeName="y"
               values="420; 420; 170; 170; 420; 420"
               keyTimes="0; 0.48; 0.51; 0.54; 0.57; 1"
               dur="7s"
               repeatCount="indefinite"
               calcMode="spline"
               keySplines="0 0 1 1; 0.4 0 0.6 1; 0 0 1 1; 0.4 0 0.6 1; 0 0 1 1"/>
    </rect>
  </g>
  
  <!-- Texte -->
  <text x="600" y="378" 
        class="logo-text"
        text-anchor="middle">tpm-trust</text>
</svg>
